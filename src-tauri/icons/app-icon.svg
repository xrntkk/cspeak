<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9b00"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Outer subtle ring -->
  <rect x="48" y="48" width="928" height="928" rx="192" ry="192" fill="none" stroke="#2a2a2a" stroke-width="8"/>

  <!-- Accent circle behind the microphone -->
  <circle cx="512" cy="512" r="320" fill="url(#accent)" filter="url(#shadow)"/>

  <!-- Microphone icon (white) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mic body -->
    <rect x="452" y="304" width="120" height="280" rx="60" ry="60" stroke-width="48"/>
    <!-- Mic stand -->
    <line x1="512" y1="584" x2="512" y2="744" stroke-width="48"/>
    <!-- Mic base -->
    <line x1="392" y1="744" x2="632" y2="744" stroke-width="48"/>
    <!-- Sound arc -->
    <path d="M 352 424 Q 352 304 512 304" stroke-width="48"/>
    <path d="M 672 424 Q 672 304 512 304" stroke-width="48"/>
  </g>

  <!-- CS crosshair overlay badge -->
  <g transform="translate(720, 720)">
    <circle cx="0" cy="0" r="112" fill="#1f1f1f" stroke="#ff9b00" stroke-width="16"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#ffffff" stroke-width="16"/>
    <line x1="-80" y1="0" x2="-32" y2="0" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <line x1="32" y1="0" x2="80" y2="0" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <line x1="0" y1="-80" x2="0" y2="-32" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <line x1="0" y1="32" x2="0" y2="80" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
