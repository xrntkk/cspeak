name: build

# Build the csspeak desktop app on macOS.
#
# This project links several native libraries that need build tooling present
# on the runner:
#   - webrtc-audio-processing (bundled): compiles WebRTC from source via meson + ninja
#   - audiopus_sys: compiles libopus via cmake (an old CMakeLists, hence the
#     CMAKE_POLICY_VERSION_MINIMUM shim already set in src-tauri/.cargo/config.toml)
#   - DeepFilterNet model is vendored in-repo (vendor/deepfilter/models), so no
#     network fetch is needed at build time.
#
# Starts macOS-only; Linux/Windows can be added as extra matrix entries once the
# native build is proven green here.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin   # Apple Silicon
            runner: macos-14
          - target: x86_64-apple-darwin    # Intel
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build tools (meson, ninja)
        run: brew install meson ninja
        # cmake is preinstalled on GitHub macOS runners.

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build app (tauri)
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: csspeak-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn
